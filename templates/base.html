<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Badminton Academy{% endblock %}</title>
  
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Optional custom CSS -->
  <style>
    body {
      padding-top: 60px;
    }
  </style>
</head>
<body>
  
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('students') }}">Badminton Academy</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('students') }}">Students</a></li>
          <li class="nav-item"><a class="nav-link" href="{{url_for('coaches')}}">Coaches</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('batches') }}">Batches</a></li>
          <li class="nav-item"><a class="nav-link" href="{{url_for('schedules')}}">Schedules</a></li>
          <li class="nav-item"><a class="nav-link" href="{{url_for('waitingstudents')}}">Waiting List</a></li>
        </ul>
      </div>
    </div>
  </nav>
  
  <!-- Main content -->
  <main>
    {% block content %}{% endblock %}
  </main>
  
  <!-- Bootstrap JS Bundle CDN (Popper + Bootstrap JS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
</body>
</html>
